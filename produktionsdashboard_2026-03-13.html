<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produktionslinjeschema – Sunds Industrier</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red-bg:#FDEDEC;--red-text:#922B21;
  --green:#1A7A4C;--green-bg:#EAFAF1;--green-text:#1A5E38;
  --amber:#B7770D;--amber-bg:#FEF9E7;--amber-text:#7D6608;
  --blue:#1565C0;--blue-bg:#EBF5FB;--blue-text:#0D47A1;
  --border:#DDE1E4;--bg:#F7F8FA;--surface:#fff;
  --text:#1A1F2C;--muted:#6B7685;
  --font:'Segoe UI',system-ui,sans-serif;
  --header-bg:#1C2A35;
}
html{font-size:13px;font-family:var(--font);background:var(--bg);color:var(--text)}
body{padding:14px 16px 24px;min-width:600px}

/* Header */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.hdr-left h1{font-size:17px;font-weight:700;color:var(--header-bg);letter-spacing:-.3px}
.hdr-left p{font-size:11px;color:var(--muted);margin-top:3px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.snapshot{font-size:11px;background:var(--header-bg);color:#CFD8DC;padding:3px 9px;border-radius:3px;white-space:nowrap}
.legend{display:flex;gap:10px;font-size:11px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;border-top:3px solid transparent}
.metric.danger{border-top-color:var(--red)}.metric.success{border-top-color:var(--green)}
.metric.warning{border-top-color:var(--amber)}.metric.info{border-top-color:var(--blue)}
.metric.neutral{border-top-color:#90A4AE}
.m-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}
.m-value{font-size:24px;font-weight:700;line-height:1}
.metric.danger .m-value{color:var(--red)}.metric.success .m-value{color:var(--green)}
.metric.warning .m-value{color:var(--amber)}.metric.info .m-value{color:var(--blue)}
.metric.neutral .m-value{color:#546E7A}
.m-sub{font-size:10px;color:var(--muted);margin-top:4px}

/* Controls */
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.btn-filter{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;color:var(--text);font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn-filter:hover{background:#ECEFF1}.btn-filter.active{background:var(--header-bg);color:#fff;border-color:var(--header-bg)}
.search{font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);outline:none;margin-left:auto;width:190px;background:var(--surface);color:var(--text)}
.search:focus{border-color:#78909C}

/* Table */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
col.c1{width:100px}col.c2{width:auto}col.c3{width:130px}col.c4{width:50px}col.c5{width:76px}col.c6{width:155px}col.c7{width:215px}
thead th{background:var(--header-bg);color:#CFD8DC;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:hover{background:#263E4D}
thead th .si{opacity:.4;margin-left:3px;font-size:9px}
thead th.sorted .si{opacity:1}
tbody tr{border-bottom:1px solid #EEF0F2;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#F4F6F8!important}
tbody td{padding:7px 10px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody td.op-td{white-space:normal}

/* Status */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.03em}
.badge.overdue{background:var(--red-bg);color:var(--red-text)}
.badge.today{background:var(--green-bg);color:var(--green-text)}
.badge.upcoming{background:#EDE7F6;color:#512DA8}

/* Row tinting */
tr.row-overdue{background:#FFF8F7!important}
tr.row-today{background:#F2FBF6!important}

/* Progress */
.pcell{display:flex;align-items:center;gap:6px}
.pbar{flex:1;height:5px;background:#ECEFF1;border-radius:3px;overflow:hidden;min-width:50px}
.pfill{height:100%;border-radius:3px}
.p-lo{background:#EF9A9A}.p-mi{background:#FFB74D}.p-hi{background:#81C784}.p-ok{background:#4CAF50}
.ppct{font-size:10px;font-weight:700;color:var(--muted);min-width:30px;text-align:right}

/* Op chips */
.ops{display:flex;flex-wrap:wrap;gap:3px}
.chip{font-size:9px;padding:1px 4px;border-radius:2px;border:1px solid;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip.done{background:var(--green-bg);color:var(--green-text);border-color:#A9DFBF}
.chip.active{background:var(--blue-bg);color:var(--blue-text);border-color:#90CAF9;font-weight:700}
.chip.pending{background:#F5F5F5;color:#9E9E9E;border-color:#E0E0E0}

/* Footer */
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--muted)}
.footer a{color:var(--muted);text-decoration:none}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}

@media(max-width:860px){
  .metrics{grid-template-columns:repeat(3,1fr)}
  col.c3,col.c7{display:none}
  thead th:nth-child(3),tbody td:nth-child(3),thead th:nth-child(7),tbody td:nth-child(7){display:none}
}
@media(max-width:580px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  col.c4{display:none}thead th:nth-child(4),tbody td:nth-child(4){display:none}
}
</style>
</head>

  document.getElementById('fcnt').textContent=rows.length+' order visas';
  ['all','overdue','today','upcoming'].forEach(f=>{
    const cnt=f==='all'?ORDERS.length:ORDERS.filter(o=>o.statusCat===f).length;
    const el=document.getElementById('cnt-'+f);if(el)el.textContent='('+cnt+')';
    const btn=document.querySelector('[data-f="'+f+'"]');if(btn)btn.classList.toggle('active',filt===f);
  });
}

function setFilter(f){filt=f;render();}
function onSearch(v){srch=v;render();}
function doSort(c){
  if(sCol===c)sDir=-sDir;else{sCol=c;sDir=1;}
  document.querySelectorAll('[id^="si-"]').forEach(el=>{el.parentElement.classList.remove('sorted');el.textContent='⇅';});
  const si=document.getElementById('si-'+c);
  if(si){si.parentElement.classList.add('sorted');si.textContent=sDir===1?'↑':'↓';}
  render();
}

(function initMetrics(){
  const ov=ORDERS.filter(o=>o.statusCat==='overdue').length;
  const td=ORDERS.filter(o=>o.statusCat==='today').length;
  const wk=ORDERS.filter(o=>o.statusCat==='upcoming'&&o.finish<='2026-03-15').length;
  const avg=Math.round(ORDERS.reduce((s,o)=>s+o.framdrift,0)/ORDERS.length);
  document.getElementById('metrics').innerHTML=
    '<div class="metric info"><div class="m-label">Aktiva order</div><div class="m-value">'+ORDERS.length+'</div><div class="m-sub">status: startad</div></div>'
    +'<div class="metric danger"><div class="m-label">Försenade</div><div class="m-value">'+ov+'</div><div class="m-sub">slutdatum passerat</div></div>'
    +'<div class="metric success"><div class="m-label">Klar idag</div><div class="m-value">'+td+'</div><div class="m-sub">planerat slut 13/3</div></div>'
    +'<div class="metric warning"><div class="m-label">Denna vecka</div><div class="m-value">'+wk+'</div><div class="m-sub">t.o.m. 15 mars</div></div>'
    +'<div class="metric neutral"><div class="m-label">Snitt framdrift</div><div class="m-value">'+avg+'%</div><div class="m-sub">alla aktiva order</div></div>';
})();

render();
</script>
