<html lang="sv" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styrande Dokument – Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0c1018;--surface:#131923;--surface2:#1a2232;--border:#263147;--accent:#4f8ef7;--accent-dim:rgba(79,142,247,0.12);--accent-border:rgba(79,142,247,0.3);--text:#dce6f5;--text-dim:#4f637d;--text-muted:#8fa3bf;--green:#34d399;--yellow:#fbbf24;--red:#f87171}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .app-inner{display:flex;flex:1;overflow:hidden}

    /* SIDEBAR */
    #sidebar{width:290px;min-width:290px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    #sidebar-header{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
    .sidebar-brand{font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .data-ts{font-size:10px;color:var(--text-dim);font-weight:400;letter-spacing:0;text-transform:none;font-family:'IBM Plex Mono',monospace}
    #search-wrap{position:relative}
    #search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none}
    #search-box{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px 8px 30px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
    #search-box:focus{border-color:var(--accent)}
    #search-box::placeholder{color:var(--text-dim)}
    #sidebar-body{flex:1;overflow-y:auto;padding:8px 0 16px}
    #sidebar-body::-webkit-scrollbar{width:3px}
    #sidebar-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .filter-section{margin-bottom:2px}
    .section-title{padding:9px 16px;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
    .section-title:hover{color:var(--text-muted)}
    .section-title .caret{font-size:9px;transition:transform .18s}
    .section-title.collapsed .caret{transform:rotate(-90deg)}
    .section-body.hidden{display:none}

    .tree-row{display:flex;align-items:center;cursor:pointer;user-select:none;padding:4px 0;transition:background .1s}
    .tree-row:hover{background:var(--surface2)}
    .tree-row.active{background:var(--accent-dim)}
    .tree-row.active .node-label{color:var(--accent)}
    .tree-row.active .node-count{color:var(--accent)}
    .tree-toggle{width:20px;flex-shrink:0;text-align:center;font-size:9px;color:var(--text-dim);transition:transform .15s}
    .tree-toggle.open{transform:rotate(90deg)}
    .tree-toggle.leaf{opacity:0;pointer-events:none}
    .node-dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;margin-right:7px}
    .tree-row.active .node-dot{background:var(--accent)}
    .node-label{flex:1;font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .node-count{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);background:var(--surface2);padding:1px 5px;border-radius:3px;margin-right:12px;flex-shrink:0}
    .tree-children.hidden{display:none}

    .chip-row{display:flex;align-items:center;gap:8px;padding:5px 16px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:background .1s}
    .chip-row:hover{background:var(--surface2)}
    .chip-row input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0}
    .chip-row .chip-count{margin-left:auto;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim)}

    #clear-btn{display:block;margin:4px 14px 10px;padding:7px 0;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px;font-family:inherit;cursor:pointer;width:calc(100% - 28px);text-align:center;transition:all .15s}
    #clear-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* MAIN */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #main-header{padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:50px;background:var(--surface)}
    #doc-count{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);white-space:nowrap;flex-shrink:0}
    #active-filters{display:flex;flex-wrap:wrap;gap:6px;flex:1}
    .af-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);padding:3px 9px;border-radius:5px;font-size:11.5px;cursor:pointer}
    .af-chip:hover{background:rgba(79,142,247,.2)}
    .af-chip .x{font-size:10px;opacity:.6}

    #doc-list{flex:1;overflow-y:auto;padding:14px 22px}
    #doc-list::-webkit-scrollbar{width:4px}
    #doc-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .doc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 16px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:7px}
    .doc-card:hover{border-color:var(--accent);background:var(--surface2)}
    .card-top{display:flex;align-items:flex-start;gap:10px}
    .card-icon{font-size:15px;flex-shrink:0;margin-top:1px}
    .card-name{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.4;transition:color .15s}
    .doc-card:hover .card-name{color:var(--accent)}
    .card-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
    .meta-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);gap:4px}
    .s-Godkänd,.s-Approved{background:rgba(52,211,153,.1)!important;border-color:rgba(52,211,153,.25)!important;color:var(--green)!important}
    .s-Utkast,.s-Draft{background:rgba(251,191,36,.1)!important;border-color:rgba(251,191,36,.25)!important;color:var(--yellow)!important}
    .s-Utgått,.s-Obsolete{background:rgba(248,113,113,.1)!important;border-color:rgba(248,113,113,.25)!important;color:var(--red)!important}
    .card-standards{display:flex;flex-wrap:wrap;gap:4px}
    .std-tag{font-size:11px;font-family:'IBM Plex Mono',monospace;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:2px 7px;border-radius:3px;white-space:nowrap}
    .std-tag.match{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent)}
    .center-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:12px;color:var(--text-dim);font-size:13px}
  </style>

const GENERATED_AT = "2026-03-12 10:27";
// ───────────────────────────────────────────────────────────────────────────

let allDocs=[], stdTree={}, processSet=new Set(), statusSet=new Set(), ctSet=new Set();
const filters={search:'',standard:null,processes:new Set(),statuses:new Set(),cts:new Set()};

/* PARSE – hanterar både SP Taxonomy-objekt och råsträngar */
function parseTerms(raw){
  if(!raw) return [];

  // SP Taxonomy-objekt: {results: [{Label: "ISO 9001:§4:4.1"}, ...]}
  if(typeof raw === 'object' && raw.results && Array.isArray(raw.results)){
    return raw.results
      .map(r => (r.Label || '').trim())
      .filter(s => s && !/^\d+$/.test(s));
  }

  // Råsträng med Term Store-ID: "9;#ISO 9001:§4:4.1;#17;#ISO 14001:§4:4.1"
  const s = String(raw);
  if(s.includes(';#')){
    return s.split(';#')
      .filter((_,i) => i%2===1)
      .map(p => p.trim())
      .filter(p => p && !/^\d+$/.test(p));
  }

  // Enkel semikolonseparerad sträng
  return s.split(/[;\n]/).map(p => p.trim()).filter(p => p && !/^\d+$/.test(p));
}

function parseHierarchy(term){
  term=term.trim();
  if(term.includes('§')){
    const idx=term.indexOf('§');
    const std=term.slice(0,idx).replace(/:+$/,'').trim();
    const rest=term.slice(idx+1);
    const sub=rest.split(':').map(s=>s.trim()).filter(Boolean);
    const lvls=[std];
    if(sub.length)lvls.push('§'+sub[0]);
    for(let i=1;i<sub.length;i++)lvls.push(sub[i]);
    return lvls;
  }
  const parts=term.split(':').map(s=>s.trim()).filter(Boolean);
  return parts.length?parts:[term];
}

function buildTree(docs){
  const root={};
  for(const doc of docs){
    for(const term of doc.terms){
      const levels=parseHierarchy(term);
      let node=root;
      for(const lvl of levels){
        if(!node[lvl])node[lvl]={docs:new Set(),children:{}};
        node[lvl].docs.add(doc.id);
        node=node[lvl].children;
      }
    }
  }
  return root;
}

function init(){
  if(GENERATED_AT) document.getElementById('ts-label').textContent=GENERATED_AT;
  let id=0;
  for(const r of RAW_DATA){
    const terms    = parseTerms(r.standard);
    const processes= parseTerms(r.process);
    const status   = (r.status||'').trim();
    const ct       = (r.ct||'').trim();
    // standardRaw used for text search – flatten to string
    const standardRaw = terms.join('; ');
    if(status)  statusSet.add(status);
    if(ct)      ctSet.add(ct);
    processes.forEach(p=>{ if(p) processSet.add(p) });
    allDocs.push({id:id++, name:r.name||'', url:r.url||'', standardRaw, terms, processes, status, ct, modified:r.modified||''});
  }
  stdTree=buildTree(allDocs);
  renderSidebar();
  renderResults();
}

function applyFilters(){
  const q=filters.search.toLowerCase();
  return allDocs.filter(doc=>{
    if(q&&!doc.name.toLowerCase().includes(q)&&!doc.standardRaw.toLowerCase().includes(q))return false;
    if(filters.standard){
      const p=filters.standard.path;
      if(!doc.terms.some(t=>{const l=parseHierarchy(t);return p.every((s,i)=>l[i]===s)}))return false;
    }
    if(filters.processes.size&&!doc.processes.some(p=>filters.processes.has(p)))return false;
    if(filters.statuses.size&&!filters.statuses.has(doc.status))return false;
    if(filters.cts.size&&!filters.cts.has(doc.ct))return false;
    return true;
  });
}

function renderSidebar(){
  const body=document.getElementById('sidebar-body');body.innerHTML='';
  const btn=document.createElement('button');btn.id='clear-btn';btn.textContent='Rensa alla filter';btn.onclick=clearFilters;body.appendChild(btn);
  if(Object.keys(stdTree).length)body.appendChild(makeSection('Standard',buildTreeDOM(stdTree,[],0),true));
  if(processSet.size){const s=makeSection('Processområde',null,false);[...processSet].sort((a,b)=>a.localeCompare(b,'sv')).forEach(p=>s.querySelector('.section-body').appendChild(makeCheckbox(p,allDocs.filter(d=>d.processes.includes(p)).length,'processes')));body.appendChild(s)}
  if(statusSet.size){const s=makeSection('Status',null,false);[...statusSet].sort().forEach(v=>s.querySelector('.section-body').appendChild(makeCheckbox(v,allDocs.filter(d=>d.status===v).length,'statuses')));body.appendChild(s)}
  if(ctSet.size>1){const s=makeSection('Dokumenttyp',null,false);[...ctSet].sort((a,b)=>a.localeCompare(b,'sv')).forEach(c=>s.querySelector('.section-body').appendChild(makeCheckbox(c,allDocs.filter(d=>d.ct===c).length,'cts')));body.appendChild(s)}
}

function makeSection(title,contentEl,open){
  const el=document.createElement('div');el.className='filter-section';
  const hdr=document.createElement('div');hdr.className='section-title'+(open?'':' collapsed');
  hdr.innerHTML=`<span>${title}</span><span class="caret">▶</span>`;
  const bdy=document.createElement('div');bdy.className='section-body'+(open?'':' hidden');
  if(contentEl)bdy.appendChild(contentEl);
  hdr.onclick=()=>{hdr.classList.toggle('collapsed');bdy.classList.toggle('hidden')};
  el.appendChild(hdr);el.appendChild(bdy);return el;
}

function buildTreeDOM(node,path,depth){
  const wrap=document.createElement('div');wrap.className='tree-children';
  if(depth>0)wrap.classList.add('hidden');
  const keys=Object.keys(node).sort((a,b)=>{
    const aS=!a.startsWith('§')&&!/^\d/.test(a),bS=!b.startsWith('§')&&!/^\d/.test(b);
    if(aS&&!bS)return -1;if(!aS&&bS)return 1;
    return a.localeCompare(b,'sv',{numeric:true});
  });
  for(const key of keys){
    const nd=node[key],nodePath=[...path,key],hasC=Object.keys(nd.children).length>0;
    const nodeEl=document.createElement('div');nodeEl.className='tree-node';
    const row=document.createElement('div');row.className='tree-row';
    row.style.paddingLeft=(10+depth*14)+'px';
    const isActive=filters.standard&&filters.standard.path.length===nodePath.length&&filters.standard.path.every((s,i)=>s===nodePath[i]);
    if(isActive)row.classList.add('active');
    const tog=document.createElement('span');tog.className='tree-toggle'+(hasC?'':' leaf');tog.textContent='▶';
    const dot=document.createElement('span');dot.className='node-dot';
    const lbl=document.createElement('span');lbl.className='node-label';lbl.textContent=key;
    const cnt=document.createElement('span');cnt.className='node-count';cnt.textContent=nd.docs.size;
    row.append(tog,dot,lbl,cnt);
    const childWrap=buildTreeDOM(nd.children,nodePath,depth+1);
    if(hasC){tog.onclick=e=>{e.stopPropagation();const h=childWrap.classList.toggle('hidden');tog.classList.toggle('open',!h)}}
    row.onclick=()=>{
      if(isActive)filters.standard=null;
      else{filters.standard={path:nodePath,label:key};childWrap.classList.remove('hidden');if(hasC)tog.classList.add('open')}
      renderSidebar();renderResults();
    };
    nodeEl.append(row,childWrap);wrap.appendChild(nodeEl);
  }
  return wrap;
}

function makeCheckbox(label,count,filterKey){
  const el=document.createElement('label');el.className='chip-row';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=filters[filterKey].has(label);
  cb.onchange=()=>{cb.checked?filters[filterKey].add(label):filters[filterKey].delete(label);renderResults()};
  const nm=document.createElement('span');nm.textContent=label;
  const ct=document.createElement('span');ct.className='chip-count';ct.textContent=count;
  el.append(cb,nm,ct);return el;
}

function renderResults(){
  const filtered=applyFilters();
  document.getElementById('doc-count').textContent=filtered.length+' / '+allDocs.length+' dokument';
  const af=document.getElementById('active-filters');af.innerHTML='';
  if(filters.standard)af.appendChild(makeAFChip('📋 '+filters.standard.path.join(' › '),()=>{filters.standard=null;renderSidebar();renderResults()}));
  for(const p of filters.processes)af.appendChild(makeAFChip('⚙ '+p,()=>{filters.processes.delete(p);renderSidebar();renderResults()}));
  for(const s of filters.statuses) af.appendChild(makeAFChip('◉ '+s,()=>{filters.statuses.delete(s); renderSidebar();renderResults()}));
  for(const c of filters.cts)      af.appendChild(makeAFChip('▣ '+c,()=>{filters.cts.delete(c);      renderSidebar();renderResults()}));
  const list=document.getElementById('doc-list');list.innerHTML='';
  if(!filtered.length){const e=document.createElement('div');e.className='center-state';e.innerHTML='<div>Inga dokument matchar filtret</div>';list.appendChild(e);return}
  const frag=document.createDocumentFragment();
  for(const doc of filtered)frag.appendChild(makeCard(doc));
  list.appendChild(frag);
}

function makeAFChip(text,onRemove){
  const c=document.createElement('span');c.className='af-chip';
  c.innerHTML=text+' <span class="x">✕</span>';c.onclick=onRemove;return c;
}

function makeCard(doc){
  const card=document.createElement('div');card.className='doc-card';
  if(doc.url)card.onclick=()=>window.open(doc.url,'_blank');
  const top=document.createElement('div');top.className='card-top';
  const icon=document.createElement('div');icon.className='card-icon';icon.textContent=fileIcon(doc.name);
  const nm=document.createElement('div');nm.className='card-name';nm.textContent=doc.name.replace(/\.[^.]+$/,'');
  top.append(icon,nm);
  const meta=document.createElement('div');meta.className='card-meta';
  if(doc.status){const b=document.createElement('span');b.className='meta-badge s-'+doc.status;b.textContent=doc.status;meta.appendChild(b)}
  if(doc.ct){const b=document.createElement('span');b.className='meta-badge';b.textContent=doc.ct;meta.appendChild(b)}
  doc.processes.forEach(p=>{const b=document.createElement('span');b.className='meta-badge';b.innerHTML='<span>⚙</span>'+p;meta.appendChild(b)});
  if(doc.modified){const b=document.createElement('span');b.className='meta-badge';b.innerHTML='<span>📅</span>'+fmtDate(doc.modified);meta.appendChild(b)}
  const stds=document.createElement('div');stds.className='card-standards';
  for(const term of doc.terms){
    const tag=document.createElement('span');tag.className='std-tag';
    if(filters.standard){const l=parseHierarchy(term);if(filters.standard.path.every((s,i)=>l[i]===s))tag.classList.add('match')}
    tag.textContent=term;stds.appendChild(tag);
  }
  card.append(top,meta);
  if(doc.terms.length)card.appendChild(stds);
  return card;
}

function fileIcon(n){const e=(n.split('.').pop()||'').toLowerCase();return{pdf:'📄',docx:'📝',doc:'📝',xlsx:'📊',xls:'📊',pptx:'📑',ppt:'📑'}[e]||'📄'}
function fmtDate(v){if(!v)return'';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleDateString('sv-SE',{year:'numeric',month:'short',day:'numeric'})}
function clearFilters(){filters.standard=null;filters.processes.clear();filters.statuses.clear();filters.cts.clear();filters.search='';document.getElementById('search-box').value='';renderSidebar();renderResults()}

document.getElementById('search-box').addEventListener('input',e=>{filters.search=e.target.value;renderResults()});
init();
</script>
</body>
</html>
